<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="static/images/title.png">
  <title>Login - Library - Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-on="false">


<div class="container">
  <div class="lamp-wrapper">
    <svg class="lamp-svg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
      <ellipse class="inner-glow" cx="100" cy="110" rx="60" ry="30" />
      <rect class="lamp-base" x="92" y="100" width="16" height="160" rx="8" />
      <rect class="lamp-base" x="60" y="250" width="80" height="12" rx="6" />
      <g class="pull-cord">
        <line class="cord-line" x1="130" y1="110" x2="130" y2="180" />
        <circle class="cord-bead" cx="130" cy="190" r="6" />
        <circle class="cord-hit" cx="130" cy="190" r="25" fill="transparent" />
      </g>
      <path class="lamp-shade" d="M30 110 C 30 50, 170 50, 170 110 C 170 125, 30 125, 30 110 Z" />
    </svg>
  </div>

  <div class="login-form">
    <h2>Welcome</h2>
    <form id="login-form" onsubmit="return false;">
      <div class="form-group">
        <label>Account Type</label>
        <select id="user-type" name="user_type">
          <option value="Student">Student</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Full Name / Email</label>
        <input id="login-fullname" name="full_name" type="text" placeholder="Enter Full Name or Email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-password" name="password" type="password" placeholder="Enter Password" required>
      </div>
      <button id="login-btn" class="login-btn">Sign In</button>
      <p style="text-align:center;margin-top:8px;color:#ccc">Don't have an account? <a href="/register">Register</a></p>
    </form>
  </div>
</div>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/Draggable.min.js"></script>
<script src="script.js"></script>

</body>
</html>
