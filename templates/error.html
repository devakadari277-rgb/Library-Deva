{% extends 'base.html' %}

{% block title %}Error {{ error_code }} - Library - Management System{% endblock %}

{% block page_title %}System Alert{% endblock %}

{% block content %}
<div class="card-glass p-5 text-center my-5" style="max-width: 500px; margin: 0 auto;">
  <div class="stat-icon bg-danger-grad mx-auto mb-4" style="width:72px; height:72px; font-size:2rem;">
    <i class="fas fa-exclamation-triangle"></i>
  </div>
  <h2 class="fw-bold mb-2">Error {{ error_code }}</h2>
  <p class="text-secondary mb-4">{{ message }}</p>
  <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary rounded-pill bg-primary-grad border-0 px-4 py-2">
    <i class="fas fa-home me-1"></i>Return to Dashboard
  </a>
</div>
{% endblock %}
